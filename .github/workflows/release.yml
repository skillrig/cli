# Release — runs on every push to main. Two stages:
#
#   1. release-please maintains a "release PR": it parses Conventional Commits
#      since the last tag, bumps .release-please-manifest.json, and rewrites
#      CHANGELOG.md. Merging that PR tags vX.Y.Z and creates a GitHub Release,
#      setting outputs.release_created=true.
#   2. goreleaser runs ONLY when a release was just created, building the
#      cross-platform binaries and uploading them onto that tag's release.
#
# Identity matters: release-please and the release commit/tag are made with a
# GitHub App installation token (the @skillrig release bot), NOT the default
# GITHUB_TOKEN. The default token deliberately cannot trigger further workflow
# runs and cannot fire CI checks on the PRs it opens — the App identity can.
#
# workflow_dispatch allows manual verification: a dispatch re-runs release-please
# idempotently (opens/updates the release PR or no-ops) and only publishes when
# an outstanding release PR has already been merged, so it is safe to trigger.
name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release branch, tag, and GitHub Release
      pull-requests: write # open/update the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Mint release-bot token (@skillrig GitHub App)
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: release-please
        id: release
        uses: googleapis/release-please-action@v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    name: goreleaser
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload binaries onto the release
    steps:
      - name: Mint release-bot token (@skillrig GitHub App)
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # full history/tags for GoReleaser
          ref: ${{ needs.release-please.outputs.tag_name }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
